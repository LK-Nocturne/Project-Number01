<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contato — Café Aurora</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <!-- header (copiar) -->
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">Café <span>Belugas Bays</span></a>

            <input type="checkbox" id="nav-toggle-4" class="nav-toggle">
            <label for="nav-toggle-4" class="nav-toggle-label"><span></span></label>

            <nav class="nav">
                <ul class="menu">
                    <li><a href="index.html">Início</a></li>
                    <li class="dropdown">
                        <input type="checkbox" id="dd-menu-4" class="dd-checkbox">
                        <label for="dd-menu-4" class="drop-mouse">Menu ▾</label>
                        <div class="dropdown-content">
                            <a href="menu.html#cafes">Cafés</a>
                            <a href="menu.html#salgados">Salgados</a>
                            <a href="menu.html#doces">Doces</a>
                        </div>
                    </li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="contato.html">Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container contato-secao">
        <h1>Fale Conosco</h1>
        <form class="form-contato" action="#" method="post">
            <label for="nome">Nome</label>
            <input id="nome" type="text" placeholder="Seu nome">

            <label for="emailc">Email</label>
            <input id="emailc" type="email" placeholder="seu@email.com">

            <label for="mensagem">Mensagem</label>
            <textarea id="mensagem" rows="6" placeholder="Escreva sua mensagem..."></textarea>

            <button type="submit" class="btn primary">Enviar</button>
        </form>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <div class="footer-left"><h3>Café Aurora</h3></div>
            <div class="footer-right"><p>&copy; <span id="ano4"></span> Café Aurora</p></div>
        </div>
    </footer>
    <script>document.getElementById('ano4').textContent = new Date().getFullYear();</script>
</body>
</html>
