<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200" role="img" aria-label="Beluga Bays logo">
  <!-- fundo transparente -->
  <!-- ícone da beluga -->
  <g transform="translate(40,20)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- corpo -->
    <ellipse cx="90" cy="70" rx="70" ry="48" fill="#ffffff" stroke="#093B4C" stroke-width="4"></ellipse>
    <!-- olho -->
    <circle cx="120" cy="58" r="6" fill="#093B4C"></circle>
    <!-- sorriso -->
    <path d="M100 80 q12 12 28 0" stroke="#093B4C" stroke-width="3" fill="none"></path>
    <!-- bolha de café / xícara estilizada -->
    <rect x="40" y="90" width="44" height="28" rx="6" fill="#F4C9A0" stroke="#8A5A3F" stroke-width="3"></rect>
    <path d="M84 98 q6 0 10 -4" stroke="#8A5A3F" stroke-width="3" fill="none"></path>
  </g>

  <!-- texto -->
  <text x="220" y="105" font-family="Verdana, Arial, sans-serif" font-weight="600" font-size="48" fill="#093B4C">Beluga Bays</text>
  <text x="220" y="140" font-family="Verdana, Arial, sans-serif" font-size="16" fill="#6B8B97">cafeteria · cozy coffee</text>
</svg>